name: Release Windows App

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Create latest.json (NSIS)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")

          $bundleDir = "src-tauri/target/release/bundle/nsis"

          $originalExe = Get-ChildItem $bundleDir -Filter "*.exe" | Select-Object -First 1
          $originalSig = Get-ChildItem $bundleDir -Filter "*.exe.sig" | Select-Object -First 1

          if (-not $originalExe) { throw "NSIS EXE not found" }
          if (-not $originalSig) { throw "NSIS EXE signature not found" }

          # normalize filenames (no spaces)
          $safeExeName = $originalExe.Name.Replace(" ", ".")
          $safeSigName = $originalSig.Name.Replace(" ", ".")

          Rename-Item $originalExe.FullName $safeExeName
          Rename-Item $originalSig.FullName $safeSigName

          $exe = Get-ChildItem $bundleDir -Filter "*.exe" | Select-Object -First 1
          $sig = Get-ChildItem $bundleDir -Filter "*.exe.sig" | Select-Object -First 1

          $signature = (Get-Content $sig.FullName -Raw).Trim()
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/$($exe.Name)"

          $json = @{
            version = $version
            notes = "Release $version"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $url
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Set-Content "$bundleDir/latest.json" -Encoding UTF8

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/nsis/latest.json